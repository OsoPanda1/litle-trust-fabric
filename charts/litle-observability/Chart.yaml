type: application
version: 0.1.0
appVersion: "10.4.0"
keywords:
  - litle
  - observability
  - grafana
  - trust-fabric
dependencies:
  - name: grafana-operator
    version: 5.24.0
    repository: "oci://ghcr.io/grafana/helm-charts"
    condition: grafanaOperator.enabled